<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meazura | Men's Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
   <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="gallery.css">
</head>
<body>

<header>
    <img src="images/logo.png" class="logo" alt="Meazura" onclick="location.href='index.html'">
    <div id="themeToggle" style="cursor:pointer; font-size: 1.2rem;"><i class="fas fa-moon"></i></div>
</header>

<div class="container">
   <div class="btn-grid">
    <button class="btn-gold" id="openDrawerBtn">
        <i class="fas fa-plus"></i> MEN'S MEASUREMENT
    </button>
    <button class="btn-gold">
        <i class="fas fa-plus"></i> 
    <a href="women.html">
    WOMEN'S MEASUREMENT
    </a>
    </button>
    </div>
    <div id="menRecordsContainer"></div>
</div>

<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="menDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:var(--color-gold)">Men's Profile</h3>
        <button id="closeDrawerBtn" style="background:none; border:none; color:var(--color-red); font-size:1.5rem;">&times;</button>
    </div>
    
    <form id="menForm">
        <div class="input-group full">
            <label>Client Name</label>
            <input type="text" id="clientName" required>
        </div>

        <div class="form-grid">
            <div class="input-group"><label>Neck</label><input type="number" step="0.1" id="neck"></div>
            <div class="input-group"><label>Shoulder</label><input type="number" step="0.1" id="shoulder"></div>
            <div class="input-group"><label>Chest</label><input type="number" step="0.1" id="chest"></div>
            <div class="input-group"><label>Sleeve Length</label><input type="number" step="0.1" id="sleeveLength"></div>
            <div class="input-group"><label>Bicep</label><input type="number" step="0.1" id="bicep"></div>
            <div class="input-group"><label>Wrist</label><input type="number" step="0.1" id="wrist"></div>
            <div class="input-group"><label>Stomach</label><input type="number" step="0.1" id="stomach"></div>
            <div class="input-group"><label>Shirt Length</label><input type="number" step="0.1" id="shirtLength"></div>
            <div class="input-group"><label>Waist</label><input type="number" step="0.1" id="waist"></div>
            <div class="input-group"><label>Trouser Length</label><input type="number" step="0.1" id="trouserLength"></div>
            <div class="input-group full"><label>Lap/Thigh</label><input type="number" step="0.1" id="lapThigh"></div>
        </div>
        <button type="submit" class="btn-gold" style="margin-top:20px;">SAVE RECORD</button>
    </form>
</div>

<div class="modal" id="successModal">
    <div class="modal-box">
        <i class="fas fa-check-circle" style="color:var(--color-gold); font-size:3rem; margin-bottom:15px;"></i>
        <h3>Saved!</h3>
        <p style="color:var(--color-subtle)">The measurement has been secured.</p>
        <button class="btn-gold" onclick="document.getElementById('successModal').classList.remove('active')">OK</button>
    </div>
</div>




<div class="app-container">
    <button id="aiChatBtn" class="ai-fab">
        <i class="fas fa-robot"></i>
    </button>

    <div id="aiChatWindow" class="ai-chat-window">
        <div class="chat-header">
            <span>Meazura AI Assistant (Groq)</span>
            <button onclick="toggleAiChat()">&times;</button>
        </div>
        <div id="chatMessages" class="chat-messages">
            <div class="msg bot">Hello! How can I help you with your tailoring tasks today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="aiInput" placeholder="Ask about fabric, styles, or logic...">
            <button id="sendAiBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="fab-container">
    <button id="openGalleryBtn" class="fab-btn gold"><i class="fas fa-images"></i></button>
    <button id="aiChatBtn" class="fab-btn red"><i class="fas fa-robot"></i></button>
</div>

<div id="aiChatWindow" class="ai-chat-window">
    <div class="chat-header">
        <span>Meazura AI Assistant</span>
        <button onclick="toggleAiChat()">&times;</button>
    </div>
    <div id="chatMessages" class="chat-messages">
        <div class="msg bot">Hello! I'm your tailoring assistant. How can I help you today?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="aiInput" placeholder="Ask about styles, fabric...">
        <button id="sendAiBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="galleryOverlay" class="gallery-overlay">
    <div class="gallery-header">
        <div class="header-left">
            <h2>Style Inspiration</h2>
            <p>Save designs from local or Pinterest</p>
        </div>
        <button id="closeGallery" class="close-gallery-btn">&times;</button>
    </div>
    <div class="gallery-toolbar">
        <input type="file" id="imageUpload" hidden accept="image/*">
        <button class="tool-btn"  onclick="document.getElementById('imageUpload').click()"><img src="images/gallery.png" alt="gallery img icon" class="g"></button>
 <a href="https://www.pinterest.com/search/pins/?q=men%20style%202025&rs=rs&source_id=rs_KYJ5IU90">
  <img src="images/Pinterest.png" alt="Pinterest img" class="g">
 </a>
 
    </div>
    <div id="galleryGrid" class="gallery-grid"></div>
</div>

<nav class="fixed-bottom-nav">
 <a href="about.html">Extras</a>   
</nav>


<script src="gallery.js"></script>
<script src="script.js"></script>


</body>
</html>
